<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three-Tier Coder App</title>
  <style>
    :root {
      --bg: #f4efe7;
      --card: rgba(255, 252, 247, 0.92);
      --text: #1f2933;
      --muted: #52606d;
      --accent: #0b6e4f;
      --accent-dark: #084c38;
      --border: rgba(31, 41, 51, 0.12);
      --shadow: 0 24px 60px rgba(11, 36, 24, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top right, rgba(11, 110, 79, 0.18), transparent 30%),
        linear-gradient(135deg, #f7f1e8 0%, #e5f4eb 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .app {
      width: min(840px, 100%);
      background: var(--card);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 28px;
      box-shadow: var(--shadow);
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3.2rem);
      line-height: 1;
    }

    .lead {
      margin: 14px 0 0;
      max-width: 640px;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.6;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-top: 28px;
    }

    .panel {
      background: rgba(255, 255, 255, 0.75);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 20px;
    }

    .panel h2 {
      margin: 0 0 14px;
      font-size: 1.1rem;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
    }

    textarea {
      width: 100%;
      min-height: 110px;
      resize: vertical;
      padding: 12px 14px;
      font: inherit;
      border: 1px solid rgba(11, 110, 79, 0.22);
      border-radius: 14px;
      background: #fff;
    }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform 120ms ease, background 120ms ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .primary {
      background: var(--accent);
      color: #fff;
    }

    .secondary {
      background: rgba(11, 110, 79, 0.12);
      color: var(--accent-dark);
    }

    .status {
      min-height: 24px;
      margin-top: 12px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 12px;
    }

    li {
      padding: 14px 16px;
      border-radius: 14px;
      background: #fff;
      border: 1px solid var(--border);
    }

    .empty {
      color: var(--muted);
      font-style: italic;
    }

    .message-id {
      display: inline-block;
      margin-bottom: 8px;
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .message-text {
      margin: 0;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    @media (max-width: 640px) {
      .app {
        padding: 20px;
        border-radius: 18px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <p class="eyebrow">Three-Tier Demo</p>
    <h1>Frontend writes to MySQL through the backend API.</h1>
    <p class="lead">Add a message, store it in the database, and refresh the live feed to confirm the value persisted through the full request path.</p>

    <section class="grid">
      <div class="panel">
        <h2>Add message</h2>
        <label for="messageInput">Message text</label>
        <textarea id="messageInput" maxlength="255" placeholder="Type a value to store in MySQL..."></textarea>
        <div class="actions">
          <button id="save" class="primary">Save to database</button>
          <button id="refresh" class="secondary">Refresh messages</button>
        </div>
        <p id="status" class="status">Ready.</p>
      </div>

      <div class="panel">
        <h2>Stored messages</h2>
        <ul id="messageList">
          <li class="empty">No messages loaded yet.</li>
        </ul>
      </div>
    </section>
  </main>

  <script>
    const statusElement = document.getElementById('status');
    const messageList = document.getElementById('messageList');
    const messageInput = document.getElementById('messageInput');

    function setStatus(text, isError = false) {
      statusElement.textContent = text;
      statusElement.style.color = isError ? '#b42318' : 'var(--muted)';
    }

    function renderMessages(messages) {
      if (!messages.length) {
        messageList.innerHTML = '<li class="empty">No messages found in the database.</li>';
        return;
      }

      messageList.innerHTML = messages.map((message) => `
        <li>
          <span class="message-id">Message #${message.id}</span>
          <p class="message-text">${escapeHtml(message.text)}</p>
        </li>
      `).join('');
    }

    function escapeHtml(value) {
      return value
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    async function loadMessages() {
      setStatus('Loading messages...');

      try {
        const response = await fetch('/api/messages');
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();
        renderMessages(data.messages || []);
        setStatus(`Loaded ${data.messages.length} message(s).`);
      } catch (error) {
        setStatus(`Failed to load messages: ${error.message}`, true);
      }
    }

    async function saveMessage() {
      const text = messageInput.value.trim();

      if (!text) {
        setStatus('Enter a message before saving.', true);
        return;
      }

      setStatus('Saving message...');

      try {
        const response = await fetch('/api/messages', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ text })
        });

        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.error || `HTTP ${response.status}`);
        }

        messageInput.value = '';
        setStatus(`Saved message #${data.id}.`);
        await loadMessages();
      } catch (error) {
        setStatus(`Failed to save message: ${error.message}`, true);
      }
    }

    document.getElementById('save').addEventListener('click', saveMessage);
    document.getElementById('refresh').addEventListener('click', loadMessages);
    window.addEventListener('load', loadMessages);
  </script>
</body>
</html>
