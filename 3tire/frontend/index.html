<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three-Tier Coder App</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; max-width: 700px; }
    h1 { color: #2f5d8a; }
    button { padding: 10px 16px; font-size: 16px; cursor: pointer; }
    pre { background: #f6f8fa; padding: 16px; border-radius: 8px; }
  </style>
</head>
<body>
  <h1>Three-Tier Coder App</h1>
  <p>This frontend calls the backend API, which reads from the database.</p>
  <button id="fetch">Fetch message from backend</button>
  <pre id="result">Press the button to load data.</pre>

  <script>
    document.getElementById('fetch').addEventListener('click', async () => {
      const result = document.getElementById('result');
      result.textContent = 'Loading...';
      try {
        const resp = await fetch('/api/message');
        const data = await resp.json();
        result.textContent = JSON.stringify(data, null, 2);
      } catch (err) {
        result.textContent = 'Request failed: ' + err;
      }
    });
  </script>
</body>
</html>
