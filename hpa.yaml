apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sampleapp-hpa
  # namespace: mayur
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sampleapp
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 30