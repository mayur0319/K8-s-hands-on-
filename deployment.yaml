apiVersion: apps/v1
kind: Deployment
metadata:
  name: sampleapp
spec:
  replicas: 3
  selector:
    matchLabels:
      app: sampleapp
  template:
    metadata:
      labels:
        app: sampleapp
    spec:
      containers:
      - name: sampleapp
        image: mayur0319/test:v1
        imagePullPolicy: Always   # 🔥 IMPORTAN
        ports:
        - containerPort: 3000
        resources:
          requests:
            cpu: "100m"
            memory: "64Mi"
          limits:
            cpu: "300m"
            memory: "100Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: sampleapp-service
spec:
  type: LoadBalancer  # Changed from NodePort
  selector:
    app: sampleapp
  ports:
  - port: 3000
    targetPort: 3000
    protocol: TCP