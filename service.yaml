apiVersion: v1
kind: Service
metadata:
  name: sampleapp-service
spec:
  type: LoadBalancer  # Changed from NodePort
  selector:
    app: sampleapp
  ports:
  - port: 3000
    targetPort: 3000
    protocol: TCP